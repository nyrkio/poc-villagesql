name: Norkio VillageSQL Performance Benchmark

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  perf-norkio:
    runs-on:  ubuntu-latest
    steps:
      - name: Install VillageSQL
        run: |
          sudo apt install cmake libssl-dev libncurses5-dev pkg-config bison \
                 libtirpc-dev rpcsvc-proto build-essential zlib1g-dev
          git clone --depth 1 https://github.com/villagesql/villagesql-server.git
          BUILD_DIR=$HOME/build/villagesql
          DATA_DIR=$HOME/mysql-data/data
          INSTALL_BASE=$HOME
          cd villagesql-server
          mkdir -p ${BUILD_DIR}
          cd ${BUILD_DIR}
          cmake $HOME/villagesql-server -DWITH_SSL=system
          make -j $(($(getconf _NPROCESSORS_ONLN) - 2))
          mkdir -p ${DATA_DIR}
          
          "${BUILD_DIR}/bin/mysqld" --initialize-insecure --datadir="${DATA_DIR}" --basedir="${BUILD_DIR}" 2>&1 | tail -5
          echo "✓ Database initialized"

          # Generate random password (alphanumeric only to avoid shell escaping issues)
          MYSQL_PASSWORD=$(LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom | head -c 20)

          # Start server temporarily to set password
          echo "Setting up root password..."
          "${BUILD_DIR}/bin/mysqld" \
           --datadir="${DATA_DIR}" \
           --socket="${INSTALL_BASE}/mysql.sock" \
           --port=${PORT} \
           --pid-file="${INSTALL_BASE}/mysql.pid" \
           --log-error="${INSTALL_BASE}/mysql.log" \
           --daemonize 2>/dev/null

          # Set root password
          "${BUILD_DIR}/bin/mysql" --socket="${INSTALL_BASE}/mysql.sock" -u root << EOSQL 2>/dev/null
           ALTER USER 'root'@'localhost' IDENTIFIED BY '${MYSQL_PASSWORD}';
           FLUSH PRIVILEGES;

          ${BUILD_DIR}/bin/mysql --socket="${INSTALL_BASE}/mysql.sock" -u root -p${MYSQL_PASSWORD} -e "create user 'tester2'@'%' identified WITH caching_sha2_password by '.userMDS00';grant SELECT,INSERT,DELETE,UPDATE,CREATE,DROP,PROCESS,USAGE,INDEX on *.* to 'tester2'@'%' ;alter user 'tester2'@'%' require SSL; create database sysbench;"
          ${BUILD_DIR}/bin/mysql -utester2 -p'.userMDS00' --port=3306 --host=127.0.0.1 --get-server-public-key 
  
      - name: Setup Sysbench and Hooks
        run: |
          sudo apt-get update && sudo apt-get install -y sysbench
          # Inject the JSON report hook
          #sudo sed -i '/require("oltp_common")/a sysbench.hooks.report_intermediate = sysbench.report_json' /usr/share/sysbench/oltp_read_write.lua
          #sudo sed -i '/require("oltp_common")/a sysbench.hooks.report_cumulative = final_report_csv' /usr/share/sysbench/oltp_read_write.lua 
          #sudo sed -i '/require("oltp_common")/a sysbench.hooks.report_cumulative = sysbench.report_json' /usr/share/sysbench/oltp_read_write.lua 
          sudo cat << 'EOF' | sudo tee -a /usr/share/sysbench/oltp_common.lua > /dev/null

          	   function sysbench.inter_report_json(stat)
          		if not gobj then
          			      io.write('[\n')
          			      -- hack to print the closing bracket when the Lua state of the reporting
          			      -- thread is closed
          			      gobj = newproxy(true)
          			      getmetatable(gobj).__gc = function () io.write('\n]\n') end
          			   else
          			      io.write(',\n')
          			   end
          
          			   local seconds = stat.time_interval
          			   io.write(([[
          			  {
          			    "time": %4.0f,
          			    "threads": %u,
          			    "tps": %4.2f,
          			    "qps": {
          			      "total": %4.2f,
          			      "reads": %4.2f,
          			      "writes": %4.2f,
          			      "other": %4.2f
          			    },
          			    "latency": %4.2f,
          			    "errors": %4.2f,
          			    "reconnects": %4.2f
          			  }]]):format(
          				    stat.time_total,
          				    stat.threads_running,
          				    stat.events / seconds,
          				    (stat.reads + stat.writes + stat.other) / seconds,
          				    stat.reads / seconds,
          				    stat.writes / seconds,
          				    stat.other / seconds,
          				    stat.latency_pct * 1000,
          				    stat.errors / seconds,
          				    stat.reconnects / seconds
          			   ))
                     end
          
                    	
                      function final_report_json( stat )
                      	  print( "\nFinal report :")
                      	  report_json( stat, sysbench.opt.threads,stat.time_total)
                      	end
                      	
                      	function report_json(stat, threads,tm)
                      	   io.write('[\n')
                      	   io.write(([[
                      	  {
                      	    "time": %.0f,
                      	    "threads": %u,
                      	    "tps": %4.2f,
                      	    "qps": {
                      	      "total": %4.2f,
                      	      "reads": %4.2f,
                      	      "writes": %4.2f,
                      	      "other": %4.2f
                      	    },
                      	    "latency": %4.2f,
                      	    "errors": %4.2f,
                      	    "reconnects": %4.2f
                      	  }]]):format(
                      		    stat.time_total,
                      		    threads,
                      		    stat.events / tm,
                      		    (stat.reads + stat.writes + stat.other) / tm,
                      		    stat.reads / tm,
                      		    stat.writes / tm,
                      		    stat.other / tm,
                      		    stat.latency_pct * 1000,
                      		    stat.errors / tm,
                      		    stat.reconnects / tm
                      	   ))
                      	   io.write('\n]\n')
                      	end	
                      
                      function report_csv( stat, threads, tm, header )
                        if( header )  then
                          print( "time,thds,tps,qps,r,w,o,lat95,err/s,reconn/s" )
                        end
                      
                        print( string.format( "%.0f,%u,%4.2f,%4.2f,%4.2f,%4.2f,%4.2f,%4.2f,%4.2f,%4.2f",
                          stat.time_total, threads,
                          stat.events / tm, (stat.reads + stat.writes + stat.other) / tm,
                          stat.reads / tm, stat.writes / tm, stat.other / tm,
                          stat.latency_pct * 1000, stat.errors / tm, stat.reconnects / tm )
                        )
                      end
                      
                      function inter_report_csv( stat )
                        report_csv( stat, stat.threads_running, stat.time_interval, CSV_header )
                      
                        if( CSV_header )  then
                          CSV_header = false
                        end
                      end
                      
                      
                      function final_report_csv( stat )
                        print( "\nFinal report :")
                        report_csv( stat, sysbench.opt.threads, stat.time_total, true )
                      end
                      
                      if( os.getenv( "SYSBENCH_REPORT_CSV" ) ~= nil )  then
                        CSV_header = true
                        sysbench.hooks.report_intermediate = inter_report_csv
                      end
                      
                      if( os.getenv( "SYSBENCH_FINAL_REPORT_CSV" ) ~= nil )  then
                        sysbench.hooks.report_cumulative = final_report_csv
                      end
                       if( os.getenv( "SYSBENCH_REPORT_JSON" ) ~= nil )  then
                          sysbench.hooks.report_intermediate = sysbench.inter_report_json
                       end
                      
                      if( os.getenv( "SYSBENCH_FINAL_REPORT_JSON" ) ~= nil )  then
                        sysbench.hooks.report_cumulative = final_report_json
                      end
          
          EOF
          

      - name: Prepare Benchmark
        run: |
          # Prepare dataset
           /usr/bin/sysbench   --mysql-host='127.0.0.1'   --mysql-port=3306   --mysql-db=sysbench   --mysql-user='tester2'   --mysql-password='.userMDS00'   --tables=3   --table_size=10000   oltp_common prepare
           #more /usr/share/sysbench/oltp_read_write.lua
           #more /usr/share/sysbench/oltp_common.lua
         
      - name: Run Benchmark
        run: |
           #export SYSBENCH_REPORT_JSON="yes"
           export SYSBENCH_FINAL_REPORT_JSON="yes"
           #export SYSBENCH_REPORT_CSV="yes"
           #export SYSBENCH_FINAL_REPORT_CSV="yes"
           /usr/bin/sysbench  --mysql-host='127.0.0.1' --mysql-port=3306 --mysql-db=sysbench  --mysql-user='tester2'  --mysql-password='.userMDS00' --tables=3 --table_size=10000 --threads=3 --verbosity=0  --time=10 --report-interval=1  oltp_read_only run    
