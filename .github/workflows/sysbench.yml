name: VillageSQL Performance Benchmark

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  performance-run:
    runs-on: ubuntu-latest
    steps:
      - name: Install VillageSQL
        run: |
          # Download and modify the script to allow automated input
          sudo mkdir -p /var/log/mysql
          sudo chmod 755 /var/log/mysql
          sudo chown -R $USER:$USER /var/log/mysql
          curl -fsSL https://villagesql.com/shell -o install.sh
          sed -i 's/read INSTALL_CHOICE <\/dev\/tty/read INSTALL_CHOICE/' install.sh
          bash -x install.sh <<< "2"
          # Extract the generated password from the local credentials file
          MYSQL_PASSWORD=$(grep "Root Password:" "/home/runner/.villagesql/credentials.txt" | cut -d' ' -f3)
          echo ${MYSQL_PASSWORD}
          /home/runner/.villagesql/prebuilt/bin/mysql --socket=/home/runner/.villagesql/mysql.sock -u root -p${MYSQL_PASSWORD} -e "create user 'tester2'@'%' identified WITH caching_sha2_password by '.userMDS00';grant SELECT,INSERT,DELETE,UPDATE,CREATE,DROP,PROCESS,USAGE,INDEX on *.* to 'tester2'@'%' ;alter user 'tester2'@'%' require SSL; create database sysbench;"
          /home/runner/.villagesql/prebuilt/bin/mysql -utester2 -p'.userMDS00' --port=3306 --host=127.0.0.1 --get-server-public-key 
  
      - name: Setup Sysbench and Hooks
        run: |
          sudo apt-get update && sudo apt-get install -y sysbench
          # Inject the JSON report hook
          #sudo sed -i '/require("oltp_common")/a sysbench.hooks.report_intermediate = sysbench.report_json' /usr/share/sysbench/oltp_read_write.lua
          #sudo sed -i '/require("oltp_common")/a sysbench.hooks.report_cumulative = final_report_csv' /usr/share/sysbench/oltp_read_write.lua 
          sudo sed -i '/require("oltp_common")/a sysbench.hooks.report_cumulative = sysbench.report_json' /usr/share/sysbench/oltp_read_write.lua 
          
          more /usr/share/sysbench/oltp_read_write.lua
          more /usr/share/sysbench/oltp_common.lua
          

      - name: Prepare Benchmark
        run: |
          # Prepare dataset
           /usr/bin/sysbench   --mysql-host='127.0.0.1'   --mysql-port=3306   --mysql-db=sysbench   --mysql-user='tester2'   --mysql-password='.userMDS00'   --tables=3   --table_size=10000   oltp_common prepare
           more /usr/share/sysbench/oltp_read_write.lua
          
      - name: Run Benchmark
        run: |
           # export SYSBENCH_FINAL_REPORT_CSV="yes"
           # Execute the benchmark
           /usr/bin/sysbench  --mysql-host='127.0.0.1' --mysql-port=3306 --mysql-db=sysbench  --mysql-user='tester2'  --mysql-password='.userMDS00' --tables=3 --table_size=10000 --threads=3 --verbosity=0  --time=10   oltp_read_write run    
