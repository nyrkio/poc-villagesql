name: VillageSQL Performance Benchmark

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  performance-run:
    runs-on: ubuntu-latest
    steps:
      - name: Install VillageSQL
        run: |
          # Download and modify the script to allow automated input
          curl -fsSL https://villagesql.com/shell -o install.sh
          sed -i 's/read INSTALL_CHOICE <\/dev\/tty/read INSTALL_CHOICE/' install.sh
          bash -x install.sh <<< "2"

      - name: Setup Sysbench and Hooks
        run: |
          sudo apt-get update && sudo apt-get install -y sysbench
          # Inject the JSON report hook
          sudo sed -i '/require("oltp_common")/a sysbench.hooks.report_intermediate = sysbench.report_json' /usr/share/sysbench/oltp_read_write.lua

      - name: Prepare and Run Benchmark
        run: |
          # Extract the generated password from the local credentials file
          MYSQL_PWD=$(grep "Root Password:" ~/.villagesql/credentials.txt | awk '{print $3}')
          
          # Use the local binary to ensure compatibility with your Bengaluru setup
          ~/.villagesql/prebuilt/bin/mysql -u root -p"$MYSQL_PWD" \
            --socket=/home/runner/.villagesql/mysql.sock \
            -e "CREATE DATABASE IF NOT EXISTS sysbench;"

          # Execute the benchmark
          sysbench --mysql-host='127.0.0.1' --mysql-port=3306 --mysql-db=sysbench \
            --mysql-user='root' --mysql-password="$MYSQL_PWD" \
            --tables=3 --table_size=10000 --threads=3 --time=10 \
            --report-interval=1 oltp_read_write run
