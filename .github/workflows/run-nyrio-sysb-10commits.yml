name: Norkio VillageSQL Performance Benchmark 10 commits

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  get-commits:
    runs-on: ubuntu-latest
    outputs:
      commits: ${{ steps.set-matrix.outputs.commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: villagesql/villagesql-server
          fetch-depth: 200
      - id: set-matrix
        run: |
          COMMITS_JSON=$(git log -n 30 --format="%H" | jq -R . | jq -s -c .)
          echo "commits=${COMMITS_JSON}"
          echo "commits=${COMMITS_JSON}" >> $GITHUB_OUTPUT

  perf-norkio:
    needs: get-commits
    runs-on: nyrkio_16_256GB
    strategy:
      max-parallel: 30
      fail-fast: false
      matrix:
        commit_sha: ${{ fromJson(needs.get-commits.outputs.commits) }}
    steps:
      - name: Cleanup Previous Build
        run: |
          if [ -d "$HOME/clone" ]; then
            echo "Cleaning up old clone directory..."
            rm -rf "$HOME/clone"
          fi
          if [ -d "$HOME/build/villagesql" ]; then
            echo "Cleaning up old build directory..."
            rm -rf "$HOME/build/villagesql"
          fi
          sudo find $HOME -type f -size +500M -exec ls -lh {} +
          sudo du -sh $HOME/* | sort -h
          sudo rm -rf /tmp/* || true
          df -h
          
      - name: Pull and Build VillageSQL
        run: |
          PACKAGES=("cmake" "libssl-dev" "libncurses-dev" "pkg-config" "bison" "libtirpc-dev"  "rpcsvc-proto"  "build-essential"  "zlib1g-dev" "jq")
          # Update the local package index first
           sudo apt update
          
          for pkg in "${PACKAGES[@]}"; do
              if dpkg -l | grep -q "^ii  $pkg "; then
                  echo "[SKIP] $pkg is already installed."
              else
                  echo "[INSTALLING] $pkg..."
                  sudo apt install -y "$pkg"
              fi
          done
          mkdir -p "$HOME/clone"
          git clone https://github.com/villagesql/villagesql-server.git "$HOME/clone"
          cd "$HOME/clone"
          git checkout ${{ matrix.commit_sha }}
          echo "git_repo=`pwd` commit=${{ matrix.commit_sha }}"
          mkdir -p "$HOME/build/villagesql"
          cd "$HOME/build/villagesql"
          df -h
          cmake "$HOME/clone" -DWITH_SSL=system
          df -h
          make -j $(($(getconf _NPROCESSORS_ONLN) - 2))
          df -h
      - name: Install VillageSQL
        run: |         
          sudo mkdir -p /var/log/mysql
          sudo chmod 755 /var/log/mysql
          sudo chown -R $USER:$USER /var/log/mysql
          BUILD_DIR=$HOME/build/villagesql
          DATA_DIR=$HOME/mysql-data/data
          mkdir -p $HOME/mysql-data/data
          INSTALL_BASE=$HOME
          
          "${BUILD_DIR}/bin/mysqld" --initialize-insecure --datadir="${DATA_DIR}" --basedir="${BUILD_DIR}" 2>&1 | tail -5
          echo "✓ Database initialized"

          # Generate random password (alphanumeric only to avoid shell escaping issues)
          MYSQL_PASSWORD=$(LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom | head -c 20)

          # Start server temporarily to set password
          echo "Setting up root password..."
          "${BUILD_DIR}/bin/mysqld" \
           --datadir="${DATA_DIR}" \
           --socket="${INSTALL_BASE}/mysql.sock" \
           --port=3306 \
           --pid-file="${INSTALL_BASE}/mysql.pid" \
           --log-error="${INSTALL_BASE}/mysql.log" \
           --daemonize 2>/dev/null

          # Set root password
          "${BUILD_DIR}/bin/mysql" --socket="${INSTALL_BASE}/mysql.sock" -u root -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '${MYSQL_PASSWORD}';FLUSH PRIVILEGES;" 
          #create test user 
          ${BUILD_DIR}/bin/mysql --socket="${INSTALL_BASE}/mysql.sock" -u root -p${MYSQL_PASSWORD} -e "create user 'tester2'@'%' identified WITH caching_sha2_password by '.userMDS00';grant SELECT,INSERT,DELETE,UPDATE,CREATE,DROP,PROCESS,USAGE,INDEX on *.* to 'tester2'@'%' ;alter user 'tester2'@'%' require SSL; create database sysbench;"
          ${BUILD_DIR}/bin/mysql -utester2 -p'.userMDS00' --port=3306 --host=127.0.0.1 --get-server-public-key           

      # --- LUA HOOK INJECTION ---
      - name: Setup Sysbench and Hooks
        run: |
          sudo apt-get update && sudo apt-get install -y sysbench

          cat << 'LUA_SCRIPT' > /tmp/sysbench_hooks.lua
          function sysbench.inter_report_json(stat)
              if not gobj then
                  io.write('[\n')
                  gobj = newproxy(true)
                  getmetatable(gobj).__gc = function () io.write('\n]\n') end
              else
                  io.write(',\n')
              end
              local seconds = stat.time_interval
              io.write(([[
              {
                "time": %4.0f,
                "threads": %u,
                "tps": %4.2f,
                "qps": {"total": %4.2f, "reads": %4.2f, "writes": %4.2f, "other": %4.2f},
                "latency": %4.2f, "errors": %4.2f, "reconnects": %4.2f
              }]]):format(
                  stat.time_total, stat.threads_running, stat.events / seconds,
                  (stat.reads + stat.writes + stat.other) / seconds,
                  stat.reads / seconds, stat.writes / seconds, stat.other / seconds,
                  stat.latency_pct * 1000, stat.errors / seconds, stat.reconnects / seconds
              ))
          end

          function final_report_json(stat)
              report_json(stat, sysbench.opt.threads, stat.time_total)
          end

          function report_json(stat, threads, tm)
              io.write('[\n')
              io.write(([[
              {
                "time": %.0f, "threads": %u, "tps": %4.2f,
                "qps": {"total": %4.2f, "reads": %4.2f, "writes": %4.2f, "other": %4.2f},
                "latency": %4.2f, "errors": %4.2f, "reconnects": %4.2f
              }]]):format(
                  stat.time_total, threads, stat.events / tm,
                  (stat.reads + stat.writes + stat.other) / tm,
                  stat.reads / tm, stat.writes / tm, stat.other / tm,
                  stat.latency_pct * 1000, stat.errors / tm, stat.reconnects / tm
              ))
              io.write('\n]\n')
          end

          if(os.getenv("SYSBENCH_FINAL_REPORT_JSON") ~= nil) then
              sysbench.hooks.report_cumulative = final_report_json
          end
          LUA_SCRIPT
          sudo tee -a /usr/share/sysbench/oltp_common.lua < /tmp/sysbench_hooks.lua > /dev/null

      - name: Run and Post Benchmark
        env:
          TOKEN: ${{ secrets.AMROO_NYRKIO_TOKEN }}
        run: |
          export SYSBENCH_FINAL_REPORT_JSON="yes"
          #prepare and run
          /usr/bin/sysbench   --mysql-host='127.0.0.1'   --mysql-port=3306   --mysql-db=sysbench   --mysql-user='tester2'   --mysql-password='.userMDS00'   --tables=8   --table_size=10000 --threads=16  oltp_common prepare
          /usr/bin/sysbench --mysql-host='127.0.0.1' --mysql-port=3306 --mysql-db=sysbench --mysql-user='tester2' --mysql-password='.userMDS00' --tables=8   --table_size=10000 --threads=16 --verbosity=0 --time=300 --report-interval=1 oltp_read_only run > "$HOME/sysbench-result.txt"
            RESULT_FILE=$HOME/sysbench-result.txt
            # Check if file exists before proceeding
            if [[ ! -f "$RESULT_FILE" ]]; then
                echo "Error: $RESULT_FILE not found!"
                exit 1
            fi
            
            # 2. Extract values using jq directly from the file
            # The -r flag gives us raw values (no quotes)
            duration=$(jq -r '.[0].time' "$RESULT_FILE")
            tps=$(jq -r '.[0].tps' "$RESULT_FILE")
            latency=$(jq -r '.[0].latency' "$RESULT_FILE")
            threads=$(jq -r '.[0].threads' "$RESULT_FILE")
            
            # Extracting from the nested qps object
            total_qps=$(jq -r '.[0].qps.total' "$RESULT_FILE")
            reads_qps=$(jq -r '.[0].qps.reads' "$RESULT_FILE")
            writes_qps=$(jq -r '.[0].qps.writes' "$RESULT_FILE")
            other_qps=$(jq -r '.[0].qps.other' "$RESULT_FILE")
            
            errors=$(jq -r '.[0].errors' "$RESULT_FILE")
            reconnects=$(jq -r '.[0].reconnects' "$RESULT_FILE")
            echo "$tps $latency $threads $duration $total_qps $reads_qps $writes_qps $other_qps $errors $reconnects "
            cd $HOME/clone
            git_commit=$( git show -s --format=%H)
            timestamp=$(git show -s --format=%ct)
            echo "$git_commit $timestamp"
            jq -n \
            --arg ts "$timestamp" \
            --arg tps "$tps" \
            --arg lat "$latency" \
            --arg commit "$git_commit" \
            --arg dur "$duration" \
            --arg thr "$threads" \
            --arg tqps "$total_qps" \
            --arg rqps "$reads_qps" \
            --arg wqps "$writes_qps" \
            --arg oqps "$other_qps" \
            --arg err "$errors" \
            --arg rec "$reconnects" \
            '[ {
              "timestamp": ($ts | tonumber),
              "metrics": [
                { "name": "tps", "unit": "tps", "value": ($tps | tonumber), "direction": "higher_is_better" },
                { "name": "p95", "unit": "latency", "value": ($lat | tonumber), "direction": "lower_is_better" }
              ],
              "attributes": {
                "git_repo": "https://github.com/nyrkio/villagesql-poc",
                "branch": "main",
                "git_commit": $commit
              },
              "extra_info": {
                "duration": $dur, "threads": $thr, "total_qps": $tqps, "read_qps": $rqps, "writes_qps": $wqps, "other_qps": $oqps, "errors": $err, "reconnects": $rec, "tables":"8","rows":"10000"
              }
            } ]' > $HOME/metrics.json
            cat $HOME/metrics.json
            export TEST_NAME="sysbench/oltp_read_only/threads=16:table_size=8x10000"
            curl -X PUT -H "Content-type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            "https://nyrkio.com/api/v0/result/$TEST_NAME" \
            -d @"$HOME/metrics.json"
          
